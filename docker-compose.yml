services:
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "3001:3001"

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "3002:3002"

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "3003:3003"
    depends_on:
      - user-service
      - product-service