services:
  user-service:
    image: thenu8175/user-service:latest
    container_name: user-service
    ports:
      - "3001:3001"
    restart: always

  product-service:
    image: thenu8175/product-service:latest
    container_name: product-service
    ports:
      - "3002:3002"
    restart: always

  order-service:
    image: thenu8175/order-service:latest
    container_name: order-service
    ports:
      - "3003:3003"
    restart: always
    depends_on:
      - user-service
      - product-service